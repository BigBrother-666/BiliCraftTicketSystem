# 默认每公里价格
price-per-km: 0.2

# slowdown 减速控制牌预测 platform 的最大检测距离（block）。
# 列车经过 slowdown 控制牌时，向前预测寻找 platform 控制牌；超出此距离仍未找到则不减速，
# 防止玩家把 slowdown 放得过远导致的性能问题。
slowdown-max-detect-distance: 500.0

# 跨站车车票名（需要在tc插件新建，用于识别使用本车票系统的列车）
express-ticket-name: 'express'

# 可设置的最大/最小速度
speed:
  max: 5.0
  min: 2.0
  step: 0.2

# 车票使用次数相关信息
uses:
  max: 50
  discount:
    # 次数下限-次数上限-折扣
    - '5-10-0.7'
    - '11-25-0.6'
    - '26-50-0.5'

# 权限组的折扣，和上方的折扣叠加
perm-discount:
  displayname-全局管理员:
    - '1-50-0.0'
  bc-prefix-railways:
    - '1-50-0.7'
  bc-prefix-roadways:
    - '1-50-0.7'

# 交通卡
card:
  # 物品名
  name: '<gold><!italic>帕拉伦铁路交通卡'
  # 最大储蓄金额
  max-balance: 114514
  # 起步价
  base-fare: 0.5
  # 单次最大充值金额
  max-signle-charge: 1000

# 直达车（快速车）途中忽略的控制牌类型（按控制牌第二行关键字前缀匹配）。
# 直达车跨越中途站时，列在这里的控制牌不触发（被取消）；只有到达终点站时才放行、正常停车。
# 终点站的判断依据导航进度（列车走完全部道岔即视为到达终点区段），与控制牌是否写站名无关。
# 例：station 让直达车穿过只有停靠线的中途站不停车；announce 抑制中途站的进出站播报。
express-skip-signs:
  - "station"
  - "announce"
  - "sound"

# 购票界面最多显示的车票数：即寻路返回的「距离最短的前 N 条路线」对应的车票数上限。
# <=0 表示不限制（显示全部候选路线）。
max-search-results: 5

# 坐车凭证字体设置
font:
  # 字体名，从系统注册的字体寻找，留空则读取配置文件夹下的font-file，都留空使用默认字体
  name: ''
  font-file: ''
  size: 8.0
  bold: true

lore:
  # 公共占位符：
  # {start_station_name} {start_railway_name} {start_line_color} {start_railway_system}
  # {end_station_name} {end_railway_system}
  # {start_station_full} {end_station_full}  带色站名+(系统名)，站点为空显示N/A
  # {distance} {speed} {price}
  # {path_info_lore} {railway_info_lore} {distance_info_lore} 必须放在单独一行
  # ticket独有：
  # {max_uses} {owner_name}
  # distance_info_lore独有：
  # {railway_system} {system_distance} {system_price} {system_price_per_km}
  # card独有：
  # {balance} {use_platform}
  # ================== 车票lore相关 ==================
  ticket:
    - '<!italic><dark_purple>▶ 路线'
    - '<italic>{start_station_full} <gold>====直达====＞ {end_station_full}'
    - '<!italic><dark_purple>▶ 车票使用方法'
    - '<italic><gold>前往 {start_railway_system} <gold>的 {start_line_color}{start_station_name}站 , <gold>使用标有 {start_line_color}{start_railway_name} <gold>的发车装置发车, 主手拿本车票上车'
    - '<!italic><dark_purple>▶ 路线详情（只停起始站和终到站）'
    - '{path_info_lore}'
    - '<!italic><dark_purple>▶ 途经铁路'
    - '{railway_info_lore}'
    - '<italic><light_purple>{distance} km | 最大速度 {speed} km/h'
  # 这部分lore会在购买后移除
  ticket-price:
    - '<!italic><dark_gray>======================================'
    - '<!italic><dark_purple>▶ 各铁路系统收费详情(不含折扣)'
    - '{distance_info_lore}'
    - ''
    - '<!italic><light_purple>总价(含折扣)：{price}银币     点击购买'
  # 每行{distance_info_lore}的具体格式
  distance-info-lore: '<gold>{railway_system} <dark_aqua>{system_distance}km <aqua>{system_price}银币'

  # ================== 交通卡lore相关 ==================
  card:
    - '<dark_purple><!italic>▶ 交通卡信息'
    - '<gold><!italic>余额：<italic><dark_aqua>{balance}</italic>'
    - '<gold><!italic>起始站：<italic>{start_station_full}</italic>'
    - '<gold><!italic>终到站：<italic>{end_station_full}</italic>'
    - '<gold><!italic>可用站台：<italic>{use_platform}</italic>'
  # 路线详情lore每行最多显示的车站数
  station-name-cnt-perrow: 7
  # 途经铁路lore每行最多显示的车站数
  railway-name-cnt-perrow: 4


# 普通车 bossbar 滚动站名带样式（直达车 bossbar 文案见 message.express-normal/express-end）
bossbar:
  # 已过站颜色（支持 #RRGGBB 十六进制或 legacy &-code）
  passed-color: '&7'
  # 未过站颜色（支持 #RRGGBB 或 legacy &-code）；留空则使用该线路 railway_routes.yml 中的 line-color
  not-passed-color: ''
  # 已过站最大显示个数
  passed-num: 2
  # 未过站最大显示个数
  not-passed-num: 3
  # 到站标题：使用 railway_routes.yml 中各线路的 bossbar-arrival-notice（占位符 {curr_station}），
  # 该线路留空则到站时显示滚动站名带（…上一站 → 当前站 → 下一站…）
