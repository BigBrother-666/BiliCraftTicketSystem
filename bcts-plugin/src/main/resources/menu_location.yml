# 可用占位符{railway_system}
# 如果玩家是选择的系统进入该界面，则是系统名；
# 如果玩家通过搜索进入该页面，则是 关键词: 搜索的关键词
title: <#FF8C00>车站选择-{railway_system}

structure:
  - ". . . . . . . . u"
  - ". . . . . . . . #"
  - ". . . . . . . . n"
  - ". . . . . . . . #"
  - ". . . . . . . . #"
  - ". . . . . . . . d"

mapping:
  - "n item-nearest"
  - ". content"
  - "# ORANGE_STAINED_GLASS_PANE"
  - "u item-scrollup"
  - "d item-scrolldown"

# 车站列表不再手动配置：自动来自 geojson 路由图的全部车站。
# 图标统一使用 menuitems.yml 的 station 项（缺失时回退 RAIL），
# 显示名为站名（按所属线路标志色上色），lore 为该站经过的线路。
