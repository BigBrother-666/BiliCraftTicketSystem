# 铁轨遍历期间使用车票/交通卡上车时的提示（普通车不受影响）
traversal-ticket-blocked: '<red>铁路系统正在进行铁轨遍历，暂停车票/交通卡使用，请稍后再试'
# 已有遍历正在进行时再次发起的提示
traversal-already-running: '<red>已有一个铁轨遍历任务正在进行，请等待其完成，或使用 /railgeo stopWalk 停止'
# 处于冷却期时发起的提示（%d 为剩余冷却秒数）
traversal-cooling-down: '<red>铁轨遍历正在冷却中，请 %d 秒后再试'
# 发起停止当前遍历任务时的提示
traversal-stop-requested: '<yellow>已请求停止当前铁轨遍历任务...'
# 没有正在进行的遍历任务时发起停止的提示
traversal-no-running: '<red>当前没有正在进行的铁轨遍历任务'
# 铁轨遍历期间使用 ticketconfig 线路/铁路系统配置指令时的提示
traversal-config-blocked: '<red>铁路系统正在进行铁轨遍历，暂停线路/铁路系统配置指令，请稍后再试'
# 有玩家正在进行线路/铁路系统配置向导时发起遍历的提示
traversal-wizard-active: '<red>有玩家正在进行线路/铁路系统配置，请等其完成后再发起遍历'

# ================== 配置向导 ==================
# 向导异步步骤开始处理时的提示
wizard-async-processing: '<gray>正在处理，请稍候...'
# 向导异步步骤超时的提示
wizard-async-timeout: '<red>处理超时（可能是图片直链无法访问或网络较慢），请重新输入。'
# 铁路系统 logo 图片下载并处理成功的提示
wizard-logo-download-success: '<green>logo 图片下载并处理完成'


